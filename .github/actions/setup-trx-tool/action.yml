name: Setup trx-to-vsplaylist tool
description: Install trx-to-vsplaylist for the current job and clean it up in post

inputs:
  tool-version:
    description: Version of trx-to-vsplaylist to install
    required: false
    default: '1.3.0'

runs:
  using: node24
  main: dist/index.js
  post: dist/post.js
