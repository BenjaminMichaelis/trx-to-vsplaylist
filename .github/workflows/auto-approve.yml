name: Auto-approve version update PRs

on:
  pull_request:
    branches:
      - main

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    # Filter by branch name rather than actor — when using a PAT for PR creation,
    # github.actor is the PAT owner, not 'github-actions[bot]'.
    if: startsWith(github.head_ref, 'update-trx-to-vsplaylist-')
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Auto-approve PR
        run: gh pr review --approve "${{ github.event.pull_request.html_url }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        # Run after approval so auto-merge isn't rejected due to missing required review.
        run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
