name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        id: npm-ci
        run: npm ci

      - name: Lint
        id: npm-lint
        run: npm run lint

      - name: Typecheck
        id: npm-typecheck
        run: npm run typecheck

      - name: Test
        id: npm-test
        run: npm run test

  test-action:
    name: GitHub Actions Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Create TRX file
        shell: bash
        run: |
          mkdir -p TestResults
          cat > TestResults/comprehensive.trx << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <TestRun id="a1b2c3d4-e5f6-7890-abcd-ef1234567890" name="Test Run" xmlns="http://microsoft.com/schemas/VisualStudio/TeamTest/2010">
            <TestDefinitions>
              <UnitTest name="PassedTest" id="11111111-1111-1111-1111-111111111111">
                <TestMethod className="MyTests.Tests" name="PassedTest" />
              </UnitTest>
              <UnitTest name="FailedTest" id="22222222-2222-2222-2222-222222222222">
                <TestMethod className="MyTests.Tests" name="FailedTest" />
              </UnitTest>
            </TestDefinitions>
            <TestEntries>
              <TestEntry testId="11111111-1111-1111-1111-111111111111" testListId="19431567-8539-422a-85d7-44ee4e166bda" executionId="aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa" />
              <TestEntry testId="22222222-2222-2222-2222-222222222222" testListId="19431567-8539-422a-85d7-44ee4e166bda" executionId="bbbbbbbb-bbbb-bbbb-bbbb-bbbbbbbbbbbb" />
            </TestEntries>
            <TestLists>
              <TestList name="Results Not in a List" id="19431567-8539-422a-85d7-44ee4e166bda" />
            </TestLists>
            <Results>
              <UnitTestResult executionId="aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa" testId="11111111-1111-1111-1111-111111111111" testName="PassedTest" outcome="Passed" />
              <UnitTestResult executionId="bbbbbbbb-bbbb-bbbb-bbbb-bbbbbbbbbbbb" testId="22222222-2222-2222-2222-222222222222" testName="FailedTest" outcome="Failed" />
            </Results>
          </TestRun>
          EOF

      - name: Setup .NET SDK
        id: setup-dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install trx-to-vsplaylist tool
        id: install-tool
        shell: bash
        run: |
          TOOL_PATH="$RUNNER_TEMP/.dotnet-tools-trx-to-vsplaylist"
          dotnet tool install --tool-path "$TOOL_PATH" trx-to-vsplaylist --version 1.3.0 --source https://api.nuget.org/v3/index.json || \
          dotnet tool update --tool-path "$TOOL_PATH" trx-to-vsplaylist --version 1.3.0 --source https://api.nuget.org/v3/index.json
          echo "$TOOL_PATH" >> "$GITHUB_PATH"

      - name: Test Local Action
        id: test-action
        uses: ./
        with:
          trx-file-path: './TestResults/comprehensive.trx'
          artifact-name: test-results-${{ matrix.os }}

      - name: Verify Action Outputs
        shell: bash
        run: |
          if [ -z "${{ steps.test-action.outputs.artifact-dir }}" ]; then
            echo "ERROR: artifact-dir output was empty" && exit 1
          fi
          echo "artifact-dir: ${{ steps.test-action.outputs.artifact-dir }}"
          echo "playlist-paths: ${{ steps.test-action.outputs.playlist-paths }}"
