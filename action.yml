---
name: 'TRX to VS Playlist Converter'
description: >
  Convert TRX test result files to Visual Studio Test playlist files.
author: 'BenjaminMichaelis'
branding:
  icon: 'play'
  color: 'blue'

inputs:
  trx-file-path:
    description: >
      Path or glob pattern to the TRX file(s) to convert. Supports wildcards like *.trx or **/TestResults/*.trx.
      Multiple TRX files will be merged into a single playlist by default unless separate is true.
    required: true
  output-directory:
    description: >
      Directory to write the output playlist file(s) to (optional). If not specified, the
      playlist will be saved in the same directory as the TRX file with the
      same name but .playlist extension.
    required: false
  test-outcomes:
    description: >
      Test outcomes to include in the playlist (comma-separated). Accepts:
      Passed, Failed, NotExecuted, Inconclusive, Timeout, Pending. Default: Failed
    required: false
    default: 'Failed'
  artifact-name:
    description: >
      Name for the uploaded artifact. If not specified, defaults to 'test-results-<run_id>'.
    required: false
  skip-empty:
    description: >
      Skip writing out empty playlist files. If true, empty playlists will not be created. Default: true
    required: false
    default: 'true'
  separate:
    description: >
      When multiple TRX files are found, create separate playlist files for each instead of merging into one.
      If output-directory is not specified, playlists will be created in the same directory as the source TRX files.
      Default: false (merge into single playlist)
    required: false
    default: 'false'
  tool-version:
    description: >
      Version of trx-to-vsplaylist .NET tool to install.
    required: false
    default: '1.3.0'
  dotnet-version:
    description: >
      .NET SDK channel to install (e.g. '10.0'). Installation is skipped when a
      compatible SDK matching the requested channel is already available on PATH;
      otherwise the requested SDK channel is installed automatically.
    required: false
    default: '10.0'

outputs:
  playlist-path:
    description: 'Path to the generated playlist file (when using merge mode with single output)'
  playlist-paths:
    description: 'Colon-separated list of generated playlist paths (relative when possible in separate mode)'
  playlist-paths-json:
    description: 'JSON array of generated playlist paths (platform-safe for Windows absolute paths)'
  artifact-dir:
    description: 'Directory containing the generated playlist file(s)'

runs:
  using: 'node24'
  pre: 'dist/pre.js'
  main: 'dist/index.js'
  post: 'dist/post.js'
  post-if: 'always()'
